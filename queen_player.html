<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elizabeth's Contribution · CorroCheck 2.0</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A1628;
      color: #F1F5F9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: #111F35;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: #172540;
      border-bottom: 1px solid rgba(167,139,250,0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-box {
      width: 38px;
      height: 38px;
      background: rgba(167,139,250,0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-box svg { width: 20px; height: 20px; fill: #A78BFA; }

    .title-group h2 {
      font-size: 15px;
      font-weight: 700;
      color: #F1F5F9;
    }

    .title-group p {
      font-size: 12px;
      color: #64748B;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(6,182,212,0.12);
      border: 1px solid rgba(6,182,212,0.3);
      border-radius: 8px;
      color: #06B6D4;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .back-btn:hover {
      background: rgba(6,182,212,0.22);
      border-color: rgba(6,182,212,0.6);
    }

    .back-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .video-wrapper {
      background: #000;
      display: flex;
      justify-content: center;
    }

    .video-wrapper video {
      width: 100%;
      max-height: 520px;
      display: block;
      outline: none;
    }

    .footer {
      padding: 14px 24px;
      background: #172540;
      border-top: 1px solid rgba(167,139,250,0.15);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(167,139,250,0.12);
      border-radius: 20px;
      font-size: 11px;
      color: #A78BFA;
    }

    .badge svg { width: 12px; height: 12px; fill: #A78BFA; }

    .footer-text {
      font-size: 12px;
      color: #64748B;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-left">
        <div class="icon-box">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="title-group">
          <h2>My Contributions to CorroCheck 2.0</h2>
          <p>Elizabeth Nuugonya · Group 7 · Electronics &amp; Computer Engineering</p>
        </div>
      </div>
      <a class="back-btn" href="javascript:history.back()">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Portfolio
      </a>
    </div>

    <div class="video-wrapper">
      <video controls autoplay>
        <source src="/queen.mp4" type="video/mp4" />
        Your browser does not support HTML5 video.
      </video>
    </div>

    <div class="footer">
      <span class="badge">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        CorroCheck 2.0 · Group Project
      </span>
      <span class="footer-text">University of Namibia · Student ID 225066963</span>
    </div>
  </div>
</body>
</html>
